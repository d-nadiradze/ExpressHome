services:
  app:
    # On the server, `docker compose pull` fetches this prebuilt image (built in CI).
    # Locally, `docker compose build` still works and tags the image with this name.
    image: ${APP_IMAGE:-ghcr.io/d-nadiradze/expresshome-app:latest}
    build:
      context: .
      target: runner
    container_name: myhome-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://myhome:${MYSQL_PASSWORD}@mysql:3306/myhome_parser
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_URL=${APP_URL}
      - NEXT_PUBLIC_APP_URL=${APP_URL}
      - MYHOME_PREFILL_HEADLESS=${MYHOME_PREFILL_HEADLESS:-true}
      - MYHOME_AUTO_PUBLISH=${MYHOME_AUTO_PUBLISH:-false}
      - SSGE_PREFILL_HEADLESS=${SSGE_PREFILL_HEADLESS:-true}
      - SSGE_AUTO_PUBLISH=${SSGE_AUTO_PUBLISH:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - UPLOAD_DIR=/app/data/uploads
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/d-nadiradze/expresshome-worker:latest}
    build:
      context: .
      target: worker-runner
    container_name: myhome-worker
    restart: unless-stopped
    command: ["node", "node_modules/tsx/dist/cli.mjs", "src/worker/prefill-worker.ts"]
    environment:
      - HOME=/app
      - DATABASE_URL=mysql://myhome:${MYSQL_PASSWORD}@mysql:3306/myhome_parser
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379
      - MYHOME_PREFILL_HEADLESS=${MYHOME_PREFILL_HEADLESS:-true}
      - MYHOME_AUTO_PUBLISH=${MYHOME_AUTO_PUBLISH:-true}
      - MYHOME_API_PREFILL=${MYHOME_API_PREFILL:-true}
      - MYHOME_API_PREFILL_FALLBACK=${MYHOME_API_PREFILL_FALLBACK:-true}
      - SSGE_PREFILL_HEADLESS=${SSGE_PREFILL_HEADLESS:-true}
      - SSGE_AUTO_PUBLISH=${SSGE_AUTO_PUBLISH:-true}
      - SSGE_API_PREFILL=${SSGE_API_PREFILL:-true}
      - SSGE_API_PREFILL_FALLBACK=${SSGE_API_PREFILL_FALLBACK:-true}
      - SSGE_TOKEN_CACHE=${SSGE_TOKEN_CACHE:-true}
      - SSGE_TOKEN_CACHE_SKEW_MS=${SSGE_TOKEN_CACHE_SKEW_MS:-120000}
      - SSGE_HTTP_AUTH=${SSGE_HTTP_AUTH:-false}
      - PREFILL_MAX_CONCURRENT=${PREFILL_MAX_CONCURRENT:-3}
      - UPLOAD_DIR=/app/data/uploads
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    # Playwright needs shared memory
    shm_size: "1gb"

  redis:
    image: redis:7-alpine
    container_name: myhome-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: myhome-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=myhome_parser
      - MYSQL_USER=myhome
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: myhome-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount the SSL config directly so `git pull` can't revert the live config
      # to the HTTP-only template (which drops the :443 server block).
      - ./nginx/default.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    container_name: myhome-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mysql-data:
  redis-data:

networks:
  app-network:
    driver: bridge
