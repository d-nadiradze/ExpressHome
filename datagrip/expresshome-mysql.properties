# ExpressHome — MySQL connection for DataGrip
# DataGrip: + → Data Source → MySQL → fill General tab, or paste jdbc.url on URL tab
#
# Local app (.env DATABASE_URL):
#   mysql://USER:PASSWORD@localhost:3306/myhome_parser
#
# Docker Compose (docker-compose.yml, port mapped to host):
#   mysql://myhome:MYSQL_PASSWORD@127.0.0.1:3306/myhome_parser

name=ExpressHome MySQL
host=127.0.0.1
port=3306
database=myhome_parser
user=myhome
password=REPLACE_WITH_MYSQL_PASSWORD_FROM_.env

jdbc.url=jdbc:mysql://127.0.0.1:3306/myhome_parser?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

# Prisma / app (copy into .env)
database.url=mysql://myhome:REPLACE_WITH_MYSQL_PASSWORD_FROM_.env@127.0.0.1:3306/myhome_parser
