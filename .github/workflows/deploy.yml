name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        required: true
        default: main

# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — server hostname or IP
#   DEPLOY_USER       — SSH user (e.g. ubuntu)
#   DEPLOY_SSH_KEY    — private key (full PEM, including BEGIN/END lines)
#
# Optional repository variable DEPLOY_APP_DIR (defaults to /opt/myhome-parser)
#
# No registry secret needed: images are pushed to GHCR with the built-in
# GITHUB_TOKEN, and the server logs in with that same token at deploy time.

env:
  APP_IMAGE: ghcr.io/d-nadiradze/expresshome-app
  WORKER_IMAGE: ghcr.io/d-nadiradze/expresshome-worker

jobs:
  # 1) Build the images once on GitHub's runners (fast, with layer cache) and
  #    push them to GHCR — no more slow compilation on the VPS.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker-runner
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # 2) SSH to the VPS, refresh the compose file, then pull + restart. No build.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_BRANCH: ${{ github.event.inputs.branch }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: GHCR_USER,GHCR_TOKEN,GIT_BRANCH
          script: |
            set -e
            APP_DIR='${{ vars.DEPLOY_APP_DIR }}'
            [ -z "$APP_DIR" ] && APP_DIR=/opt/myhome-parser
            cd "$APP_DIR"
            git fetch origin
            git checkout "$GIT_BRANCH"
            git pull origin "$GIT_BRANCH"
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            sudo docker compose pull app worker
            sudo docker compose up -d app worker
            sudo docker logout ghcr.io
            sudo docker image prune -f
